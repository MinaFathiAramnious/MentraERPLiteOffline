<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#0f172a">
    
    <title>إعداد النظام | Mentra Lite</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/img/smalicon.png">
    <link rel="apple-touch-icon" href="assets/img/smalicon.png">
    
    <!-- تحميل المكتبات الأساسية فقط (بدون React) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="assets/js/db-init.js"></script>
    <!-- الأنماط المخصصة للنظام -->
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(registration => {
        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
      })
      .catch(err => {
        console.log('ServiceWorker registration failed: ', err);
      });
  });
}
    </script>
    <!-- كود التحقق الفوري (يوضع هنا ليعمل قبل تحميل أي شيء في الصفحة) -->
    <script>
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.replace('dashboard.html');
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--neutral-50); 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-[100dvh] p-3 md:p-4 text-right bg-slate-50">

    <div class="max-w-md w-full glass-card rounded-[2rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden">
        
        <!-- الهيدر -->
        <div class="bg-slate-900 p-6 md:p-8 text-center text-white relative">
            <div class="w-12 h-12 md:w-16 md:h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-blue-500/30">
                <i class="fas fa-rocket text-xl md:text-3xl animate-bounce"></i>
            </div>
            <h2 class="text-xl md:text-2xl font-black italic tracking-tight">إعداد مشروعك الجديد</h2>
            <p class="text-emerald-400 text-[9px] md:text-[10px] mt-2 font-black uppercase tracking-widest">
                <i class="fas fa-lock mr-1"></i> جميع البيانات ستبقى على جهازك فقط
            </p>
        </div>

        <!-- الفورم -->
        <form id="setup-form" class="p-6 md:p-8 space-y-4 md:space-y-5">
            
            <!-- رسائل النظام -->
            <div id="status-message" class="hidden p-4 rounded-2xl text-xs font-black flex items-center gap-2 border">
                <i id="status-icon" class="fas"></i>
                <span id="status-text"></span>
            </div>

            <div class="space-y-3.5">
                <div>
                    <label class="block text-[11px] font-black text-slate-500 mb-1.5 pr-2">اسم المشروع / المحل</label>
                    <div class="relative">
                        <i class="fas fa-briefcase absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input id="full_name" type="text" required class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 pr-11 pl-4 transition-all font-bold text-slate-700 text-[16px] outline-none text-right" placeholder="مثلاً: منارة للبرمجيات">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-500 mb-1.5 pr-2">اسم المدير (يستخدم للدخول)</label>
                    <div class="relative">
                        <i class="fas fa-user-shield absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input id="username" type="text" required class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 pr-11 pl-4 transition-all font-bold text-slate-700 text-[16px] outline-none text-right" placeholder="admin">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-500 mb-1.5 pr-2">رقم التواصل</label>
                    <div class="relative">
                        <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input id="phone" type="tel" required class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 pr-11 pl-4 transition-all font-bold text-slate-700 text-[16px] outline-none text-right" placeholder="01xxxxxxxxx">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-500 mb-1.5 pr-2">كلمة السر</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input id="password" type="password" required class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 pr-11 pl-4 transition-all font-bold text-slate-700 text-[16px] outline-none text-left" dir="ltr" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <button id="submit-btn" type="submit" class="w-full mt-2 py-4 md:py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-base md:text-lg shadow-xl shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-3">
                <span id="btn-text">بدء الاستخدام مجاناً</span>
                <i id="btn-icon" class="fas fa-check"></i>
            </button>

            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 mt-2">
                <p class="text-center text-[10px] text-blue-600 font-bold leading-relaxed">
                    النظام "أوفلاين"، لا يمكن استرجاع كلمة السر حال نسيانها، احفظها جيداً.
                </p>
            </div>
			
	    <div class="mt-8 text-center pt-6 border-t border-slate-100">
            <a href="login.html" class="text-blue-600 font-bold text-sm md:text-base hover:text-blue-800 transition-colors">
                تسجيل الدخول اذا تم تسجيل مسبقاً
            </a>
        </div>
        </form>
    </div>

    <!-- المنطق البرمجي (JavaScript) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('setup-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            const statusMsg = document.getElementById('status-message');
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // حالة التحميل
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-70');
                btnText.innerText = 'جاري تهيئة النظام...';
                btnIcon.className = 'fas fa-spinner fa-spin';
                statusMsg.classList.add('hidden');

                const fullName = document.getElementById('full_name').value.trim();
                const username = document.getElementById('username').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;

                try {
                    // ============================================================
                    // MULTI-TENANCY: إنشاء قاعدة بيانات مستقلة لكل محل
                    // ============================================================

                    // 1. توليد اسم DB خاص بهذا المحل
                    const newDBName = tenantManager.buildDBName(fullName);

                    // 2. فحص إذا كان المحل مسجل مسبقاً (نفس اسم الـ DB)
                    const existingShops = tenantManager.getShopsList();
                    const shopExists = existingShops.find(s => s.dbName === newDBName);
                    if (shopExists) {
                        showStatus('error', `المحل "${fullName}" مسجل مسبقاً! جرب اسماً مختلفاً أو سجّل دخولك.`);
                        resetButton();
                        return;
                    }

                    // 3. تفعيل الـ DB الجديد (قبل أي عملية Dexie)
                    tenantManager.switchTo(newDBName);

                    // 4. فتح قاعدة البيانات الجديدة المستقلة
                    const newDB = new Dexie(newDBName);
                    newDB.version(4).stores({
                        settings:        'id, project_name, shop_name, phone, logo',
                        local_users:     '++id, username, full_name, role',
                        active_session:  'id, user_id, login_time',
                        products:        '++id, name_ar, sku, category, stock_qty, price, cost',
                        invoices:        '++id, invoice_number, type, customer_vendor_id, date, total, status',
                        invoice_items:   '++id, invoice_id, product_id, price, qty, total_item',
                        accounts:        '++id, code, name_ar, type, balance',
                        journal:         '++id, date, ref_no, description, total',
                        journal_items:   '++id, journal_id, account_id, debit, credit',
                        stock_movements: '++id, product_id, type, qty, date, ref_id'
                    });
                    await newDB.open();

                    // 5. تسجيل المستخدم في الـ DB الجديد
                    const userId = await newDB.local_users.add({
                        full_name: fullName,
                        username: username,
                        password: password,
                        phone: phone,
                        role: 'admin',
                        created_at: new Date().toISOString()
                    });

                    // 6. حفظ إعدادات المحل الجديد
                    await newDB.table('settings').put({
                        id: 1,
                        project_name: 'MentraERPLite',
                        shop_name: fullName,
                        phone: phone,
                        currency: 'EGP',
                        tax_rate: 0
                    });

                    // 7. تفعيل جلسة الدخول
                    await newDB.active_session.clear();
                    await newDB.active_session.add({
                        id: 1,
                        user_id: userId,
                        login_time: new Date().toISOString()
                    });

                    // 8. إضافة المحل لقائمة المحلات المسجلة على الجهاز
                    tenantManager.addShopToList(fullName, newDBName, username);

                    // 9. حفظ الجلسة في LocalStorage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', fullName);
                    localStorage.setItem('userRole', 'admin');

                    // 6. نجاح وتوجيه
                    showStatus('success', 'تم إعداد نظامك بنجاح! جاري الدخول...');
                    btnText.innerText = 'تم الانتهاء';
                    btnIcon.className = 'fas fa-check-circle';
                    submitBtn.classList.replace('bg-blue-600', 'bg-emerald-500');
                    
                    setTimeout(() => {
                        window.location.replace('dashboard.html');
                    }, 1000);

                } catch (err) {
                    console.error(err);
                    showStatus('error', 'فشل حفظ البيانات في المتصفح');
                    resetButton();
                }
            });

            function showStatus(type, msg) {
                statusMsg.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-600', 'border-emerald-100', 'bg-rose-50', 'text-rose-600', 'border-rose-100');
                if (type === 'success') {
                    statusMsg.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-100');
                    statusIcon.className = 'fas fa-check-circle text-lg';
                } else {
                    statusMsg.classList.add('bg-rose-50', 'text-rose-600', 'border-rose-100');
                    statusIcon.className = 'fas fa-exclamation-triangle text-lg';
                }
                statusText.innerText = msg;
            }

            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
                btnText.innerText = 'بدء الاستخدام مجاناً';
                btnIcon.className = 'fas fa-check';
            }
        });
    </script>
</body>
</html>
