<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#2563eb">
    
    <title>تسجيل الدخول - Mentra Lite</title>
    <link rel="icon" href="assets/img/smalicon.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- تحميل المكتبات -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="assets/js/db-init.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #f8fafc;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
        .login-card { 
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* إخفاء شريط التمرير لقائمة الحسابات */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-[100dvh] p-4 bg-slate-50 relative">

    <!-- زر العودة للرئيسية -->
    <a href="index.html" class="absolute top-6 left-6 text-slate-500 hover:text-blue-600 bg-white/80 backdrop-blur-md border border-slate-200 px-4 py-2 rounded-2xl font-bold text-xs md:text-sm shadow-sm transition-all flex items-center gap-2 hover:scale-105 active:scale-95 z-10">
        <i class="fas fa-home"></i> الرئيسية
    </a>

    <div class="login-card w-full max-w-md bg-white rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-8 border border-slate-100 relative">
        
        <!-- الهيدر واللوجو -->
        <div class="text-center mb-8 mt-2">
            <div class="bg-blue-600 w-14 h-14 md:w-16 md:h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <img src="assets/img/smalicon.png" alt="Logo" class="w-8 h-8 object-contain brightness-0 invert">
            </div>
            <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Mentra ERP Lite</h1>
            <p class="text-slate-400 text-[11px] md:text-xs mt-2 font-black uppercase tracking-widest">تسجيل الدخول للنظام المحلي</p>
        </div>

        <!-- رسالة الخطأ (مخفية افتراضياً) -->
        <div id="error-message" class="hidden bg-rose-50 text-rose-600 p-4 rounded-2xl mb-6 text-sm font-black flex items-center gap-3 border border-rose-100 transition-all">
            <i class="fas fa-exclamation-circle text-lg"></i>
            <span id="error-text">حدث خطأ</span>
        </div>

        <!-- قسم الدخول السريع (يظهر برمجياً إذا كان هناك حسابات محفوظة) -->
        <div id="quick-login-section" class="hidden mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="h-px bg-slate-100 flex-1"></div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">دخول سريع</span>
                <div class="h-px bg-slate-100 flex-1"></div>
            </div>
            <div id="saved-accounts-list" class="flex gap-4 overflow-x-auto pb-2 justify-center hide-scrollbar">
                <!-- يتم حقن الحسابات هنا بواسطة JavaScript -->
            </div>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="login-form" class="space-y-4 md:space-y-5 relative">
            
            <div class="space-y-1.5">
                <label class="text-[11px] md:text-xs font-black text-slate-500 mr-2 block">اسم المستخدم أو رقم التواصل</label>
                <div class="relative">
                    <i class="fas fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input 
                        id="identifier" 
                        type="text" 
                        required 
                        class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 md:py-4 pr-11 pl-4 font-bold text-slate-700 text-[16px] outline-none transition-all text-right shadow-sm"
                        placeholder="أدخل الاسم أو رقم الموبايل"
                    />
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] md:text-xs font-black text-slate-500 mr-2 block">كلمة المرور</label>
                <div class="relative">
                    <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input 
                        id="password" 
                        type="password" 
                        required 
                        class="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-3.5 md:py-4 pr-11 pl-4 font-bold text-slate-700 text-[16px] outline-none transition-all text-left shadow-sm"
                        placeholder="••••••••"
                        dir="ltr"
                    />
                </div>
            </div>

            <!-- خيار تذكرني (تخزين الحساب للدخول السريع) -->
            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <div class="relative w-5 h-5 flex items-center justify-center bg-slate-100 border-2 border-slate-200 rounded-lg group-hover:border-blue-400 transition-colors">
                        <input type="checkbox" id="remember-me" class="peer sr-only" checked>
                        <i class="fas fa-check text-[10px] text-blue-600 opacity-0 peer-checked:opacity-100 transition-opacity absolute"></i>
                    </div>
                    <span class="text-[11px] md:text-xs font-bold text-slate-500 group-hover:text-slate-800 transition-colors select-none">حفظ بيانات الدخول</span>
                </label>
            </div>

            <button 
                id="submit-btn"
                type="submit" 
                class="w-full py-4 md:py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-base md:text-lg shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-3 active:scale-95"
            >
                <span id="btn-text">دخول للنظام</span>
                <i id="btn-icon" class="fas fa-arrow-left"></i>
            </button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-slate-100">
            <a href="subscriptions.html" class="text-blue-600 font-bold text-sm md:text-base hover:text-blue-800 transition-colors">
                ليس لديك حساب؟ إعداد النظام
            </a>
        </div>
    </div>

    <!-- Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js');
            
            // هذا السطر يراقب إذا تم تحميل Service Worker جديد وتفعيله
            // وبمجرد تفعيله يقوم بعمل ريفريش للصفحة ليعرض التعديلات الجديدة فوراً للعميل
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        });
    }
</script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {

            // 1. فحص الجلسة
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.replace('dashboard.html');
                return;
            }

            // ==========================================
            // MULTI-TENANCY: بناء قائمة المحلات للدخول السريع
            // ==========================================
            const quickLoginSection = document.getElementById('quick-login-section');
            const savedAccountsList = document.getElementById('saved-accounts-list');

            // نقرأ قائمة المحلات المسجلة على الجهاز
            const shopsList = JSON.parse(localStorage.getItem('mentra_shops_list') || '[]');
            let savedAccounts = JSON.parse(localStorage.getItem('mentra_saved_accounts') || '[]');

            // دمج المحلات مع الحسابات المحفوظة في العرض
            const displayAccounts = shopsList.map(shop => ({
                identifier: shop.username,
                name: shop.shopName,
                dbName: shop.dbName
            }));

            // دالة لرسم الحسابات المحفوظة
            function renderSavedAccounts() {
                if (displayAccounts.length === 0) {
                    quickLoginSection.classList.add('hidden');
                    return;
                }
                quickLoginSection.classList.remove('hidden');
                savedAccountsList.innerHTML = displayAccounts.map(acc => `
                    <button type="button" onclick="selectQuickAccount('${acc.identifier}', '${acc.dbName}')" class="flex flex-col items-center gap-2 group transition-all w-16">
                        <div class="w-12 h-12 md:w-14 md:h-14 rounded-2xl bg-white border-2 border-slate-200 text-slate-400 flex items-center justify-center text-xl font-black group-hover:border-blue-500 group-hover:text-blue-600 group-hover:bg-blue-50 shadow-sm transition-all active:scale-90">
                            ${acc.name.charAt(0)}
                        </div>
                        <span class="text-[10px] font-bold text-slate-500 group-hover:text-blue-600 truncate w-full text-center" title="${acc.name}">${acc.name.split(' ')[0]}</span>
                    </button>
                `).join('');
            }

            // دالة عند الضغط على أحد الحسابات المحفوظة
            window.selectQuickAccount = (identifier, dbName) => {
                const idInput = document.getElementById('identifier');
                const passInput = document.getElementById('password');

                // تفعيل DB الخاص بهذا المحل عند الضغط عليه
                if (dbName) tenantManager.switchTo(dbName);

                idInput.value = identifier;
                passInput.value = '';
                passInput.focus();

                idInput.classList.add('ring-2', 'ring-blue-200');
                setTimeout(() => idInput.classList.remove('ring-2', 'ring-blue-200'), 500);
            };

            // تشغيل دالة الرسم عند التحميل
            renderSavedAccounts();


            // ==========================================
            // معالجة نموذج تسجيل الدخول
            // ==========================================
            const form = document.getElementById('login-form');
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const rememberMe = document.getElementById('remember-me');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                errorDiv.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-75');
                btnText.innerText = 'جاري التحقق...';
                btnIcon.className = 'fas fa-spinner fa-spin';

                const identifier = document.getElementById('identifier').value.trim();
                const password = document.getElementById('password').value;

                try {
                    // ============================================================
                    // MULTI-TENANCY: البحث في كل قواعد البيانات المسجلة على الجهاز
                    // ============================================================
                    const shops = JSON.parse(localStorage.getItem('mentra_shops_list') || '[]');
                    let foundUser = null;
                    let foundDBName = null;
                    let foundShopName = null;

                    // إذا في DB نشط حالياً ابحث فيه أولاً
                    const currentDB = localStorage.getItem('mentra_current_db');
                    const searchOrder = currentDB
                        ? [currentDB, ...shops.map(s => s.dbName).filter(d => d !== currentDB)]
                        : shops.map(s => s.dbName);

                    for (const dbName of searchOrder) {
                        try {
                            const searchDB = new Dexie(dbName);
                            searchDB.version(4).stores({
                                settings: 'id, project_name, shop_name, phone, logo',
                                local_users: '++id, username, full_name, role',
                                active_session: 'id, user_id, login_time',
                                products: '++id, name_ar, sku, category, stock_qty, price, cost',
                                invoices: '++id, invoice_number, type, customer_vendor_id, date, total, status',
                                invoice_items: '++id, invoice_id, product_id, price, qty, total_item',
                                accounts: '++id, code, name_ar, type, balance',
                                journal: '++id, date, ref_no, description, total',
                                journal_items: '++id, journal_id, account_id, debit, credit',
                                stock_movements: '++id, product_id, type, qty, date, ref_id'
                            });
                            await searchDB.open();

                            const user = await searchDB.local_users.filter(u => {
                                const matchUsername = u.username && u.username.toLowerCase() === identifier.toLowerCase();
                                const matchPhone = u.phone && u.phone === identifier;
                                return matchUsername || matchPhone;
                            }).first();

                            if (user && user.password === password) {
                                foundUser = user;
                                foundDBName = dbName;
                                const shopInfo = shops.find(s => s.dbName === dbName);
                                foundShopName = shopInfo ? shopInfo.shopName : user.full_name;

                                // تفعيل الجلسة في الـ DB الصحيح
                                await searchDB.active_session.clear();
                                await searchDB.active_session.add({ id: 1, user_id: user.id, login_time: new Date().toISOString() });
                                break;
                            }
                            await searchDB.close();
                        } catch(dbErr) {
                            console.warn(`تخطي DB: ${dbName}`, dbErr);
                        }
                    }

                    if (foundUser) {
                        // تفعيل الـ DB الصحيح لهذا المحل
                        tenantManager.switchTo(foundDBName);

                        // حفظ الجلسة في LocalStorage
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userName', foundUser.full_name);
                        localStorage.setItem('userRole', foundUser.role);

                        btnText.innerText = `مرحباً بك في ${foundShopName}`;
                        btnIcon.className = 'fas fa-check';
                        submitBtn.classList.replace('bg-blue-600', 'bg-emerald-500');

                        setTimeout(() => {
                            window.location.replace('dashboard.html');
                        }, 700);

                    } else {
                        errorText.innerText = 'البيانات غير صحيحة، تأكد من اسم المستخدم أو كلمة المرور.';
                        errorDiv.classList.remove('hidden');
                        resetButton();
                    }
                } catch (err) {
                    console.error(err);
                    errorText.innerText = 'فشل الاتصال بقاعدة البيانات المحلية!';
                    errorDiv.classList.remove('hidden');
                    resetButton();
                }
            });

            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75');
                btnText.innerText = 'دخول للنظام';
                btnIcon.className = 'fas fa-arrow-left';
            }

            renderSavedAccounts();
        });
    </script>
</body>
</html>
